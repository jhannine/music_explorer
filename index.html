<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Music Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🎶 Music Explorer</h1>
    <nav>
      <a href="history.html"><button>Recent History</button></a>
      <a href="playlist.html"><button>My Playlist</button></a>
    </nav>
  </header>

 <div class="search-section">
    <input type="text" id="search" placeholder="Enter song">

    <div class="artist-container">
        <input type="text" id="artist" placeholder="Artist (Optional)">
        <div id="artistSuggestions" class="suggestions"></div>
    </div>
    <select id="year">
        <option value="">All Years</option>
        <option value="2026">2026</option>
        <option value="2025">2025</option>
        <option value="2024">2024</option>
        <option value="2023">2023</option>
        <option value="2022">2022</option>
        <option value="2021">2021</option>
        <option value="2020">2020</option>
        <option value="2019">2019</option>
        <option value="2018">2018</option>
        <option value="2017">2017</option>
        <option value="2016">2016</option>
        <option value="2015">2015</option>
    </select>

    <button id="searchBtn">Search</button>
</div>

<p id="error"></p>

  <section id="topArtists">
    <h2>Suggested Artists</h2>
    <div class="track-list" id="artistsList"></div>
  </section>

  <div id="results"></div>
  <div id="lyrics"></div>

  <!-- Persistent Player -->
  <div id="player"></div>

  <script src="script.js?v=4"></script>
</body>
</html>
