<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Playlist</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Header container */
    .header {
      display: flex;
      align-items: center;
      justify-content: center; /* center ang title */
      position: relative;      /* para ma-place ang back button sa kaliwa */
      margin-bottom: 20px;
    }

    /* Back button styling */
    #backBtn {
      position: absolute;
      left: 15px;
      padding: 8px 14px;
      background-color: green;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    #backBtn:hover {
      background-color: darkgreen;
    }

    /* Centered title */
    .header h1 {
      margin: 0;
    }
  </style>
</head>
<body>
  <!-- Header with Back button + Title -->
  <div class="header">
    <button id="backBtn" onclick="window.location.href='index.html'">⬅ Back</button>
    <h1>My Playlist</h1>
  </div>

  <ul id="playlistList"></ul>

  <!-- Persistent Player -->
  <div id="player"></div>

  <script>
    const playlist = JSON.parse(localStorage.getItem("playlist")) || [];
    const list = document.getElementById("playlistList");
    playlist.forEach(song => {
      const li = document.createElement("li");
      li.textContent = song;
      list.appendChild(li);
    });

    const currentTrack = localStorage.getItem("currentTrack");
    if (currentTrack) {
      document.getElementById("player").innerHTML = `
        <iframe src="https://open.spotify.com/embed/track/${currentTrack}" 
          width="300" height="80" frameborder="0" allow="encrypted-media"></iframe>`;
    }
  </script>
</body>
</html>
